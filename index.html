<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Yuna! 🖤💗</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* BACKGROUND IMAGE */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Make sure your photo filename matches this or change it here */
            background-image: url('yuna_photo.jpeg'); 
            background-size: cover;
            background-position: center;
            filter: brightness(0.7);
            z-index: 1;
        }

        /* OVERLAY GRADIENT FOR READABILITY */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent 50%, rgba(0,0,0,0.8));
            z-index: 2;
        }

        /* MAIN CONTENT */
        .main-card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
            max-width: 400px;
        }

        h1 {
            font-size: 2.5rem;
            color: #ff69b4; /* Pink */
            text-shadow: 0 0 10px #ff1493, 0 0 20px #000;
            margin-bottom: 10px;
            font-weight: 800;
        }

        p {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* INTERACTIVE BUTTON */
        .blow-btn {
            background-color: transparent;
            color: #ff69b4;
            border: 2px solid #ff69b4;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
        }

        .blow-btn:hover {
            background-color: #ff69b4;
            color: #000;
            box-shadow: 0 0 30px #ff69b4;
            transform: scale(1.1);
        }

        /* FLYING ELEMENTS (Hearts & Music Notes) */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            animation: flyUp linear forwards;
        }

        @keyframes flyUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="overlay"></div>

    <div class="main-card">
        <h1 id="title">WISH GRANTED!</h1>
        <p id="subtitle">Happy 17th Birthday, Yuna! 🖤💗</p>
        
        <button class="blow-btn" id="actionBtn" onclick="makeWish()">Blow the Candles! 🎂</button>
    </div>

    <script>
        const particleContainer = document.body;
        const icons = ['💗', '🖤', '✨', '🎵', '⭐', '🎈'];

        function createParticle(isBurst = false) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            
            const startX = Math.random() * 100;
            particle.style.left = startX + 'vw';
            
            const size = Math.random() * (30 - 15) + 15;
            particle.style.fontSize = size + 'px';
            
            const duration = Math.random() * 3 + 3;
            particle.style.animationDuration = duration + 's';

            if(isBurst) {
                particle.style.bottom = '20%';
                particle.style.left = (Math.random() * 60 + 20) + 'vw';
                particle.style.animationDuration = (Math.random() * 2 + 1) + 's';
            }

            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), duration * 1000);
        }

        // Background floating particles
        setInterval(() => createParticle(false), 500);

        function makeWish() {
            const title = document.getElementById('title');
            const subtitle = document.getElementById('subtitle');
            const btn = document.getElementById('actionBtn');

            // Update Text
            title.innerHTML = "DREAMS COME TRUE!";
            subtitle.innerHTML = "Keep shining, Yuna! The world is yours. ✨";
            btn.style.display = 'none';

            // Massive burst effect
            for(let i = 0; i < 50; i++) {
                setTimeout(() => createParticle(true), i * 30);
            }
        }
    </script>
</body>
</html>
